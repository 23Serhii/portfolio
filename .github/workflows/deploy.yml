name: Deploy Portfolio to Oracle Cloud

on:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Завантаження коду
        uses: actions/checkout@v4

      - name: Копіювання файлів на сервер
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          source: "."
          target: "/home/ubuntu/portfolio"

      - name: Запуск Docker на сервері
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /home/ubuntu/portfolio
            docker build -t my-portfolio .
            docker stop portfolio-app || true
            docker rm portfolio-app || true
            docker run -d -p 80:80 --name portfolio-app my-portfolio
