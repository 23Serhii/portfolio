<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 3200 400" width="3200" height="400">
    <defs>
        <radialGradient id="bgGlow" cx="50%" cy="50%" r="70%">
            <stop offset="0%" stop-color="#130b21" />
            <stop offset="100%" stop-color="#050508" />
        </radialGradient>

        <pattern id="hexGrid" width="60" height="103.923" patternUnits="userSpaceOnUse">
            <path d="M30 0 L60 17.32 L60 51.96 L30 69.28 L0 51.96 L0 17.32 Z" fill="none" stroke="#ffffff" stroke-width="1" stroke-opacity="0.04"/>
            <path d="M30 103.92 L60 86.6 L60 51.96 L30 69.28 L0 51.96 L0 86.6 Z" fill="none" stroke="#ffffff" stroke-width="1" stroke-opacity="0.04"/>
        </pattern>

        <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#a855f7" />
            <stop offset="50%" stop-color="#ec4899" />
            <stop offset="100%" stop-color="#3b82f6" />
        </linearGradient>

        <filter id="neonGlow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="12" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>

        <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="40" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <rect width="3200" height="400" fill="url(#bgGlow)" />
    <rect width="3200" height="400" fill="url(#hexGrid)" />

    <ellipse cx="2800" cy="200" rx="500" ry="200" fill="#a855f7" opacity="0.15" filter="url(#softGlow)" />
    <ellipse cx="400" cy="400" rx="600" ry="300" fill="#3b82f6" opacity="0.15" filter="url(#softGlow)" />

    <path d="M -100 360 L 1100 360 L 1200 315 L 3300 315" fill="none" stroke="url(#brandGrad)" stroke-width="3" opacity="0.7"/>
    <path d="M 1100 360 L 1150 360 L 1220 335 L 3300 335" fill="none" stroke="#ec4899" stroke-width="1" opacity="0.5"/>
    <path d="M -100 80 L 1800 80 L 1900 150 L 3300 150" fill="none" stroke="#3b82f6" stroke-width="1.5" opacity="0.4"/>

    <circle cx="1100" cy="360" r="5" fill="#a855f7" filter="url(#neonGlow)"/>
    <circle cx="1200" cy="315" r="5" fill="#ec4899" filter="url(#neonGlow)"/>
    <circle cx="1800" cy="80" r="4" fill="#3b82f6" filter="url(#neonGlow)"/>

    <g transform="translate(1100, 210)">

        <text x="0" y="-15" font-family="'Inter', -apple-system, sans-serif" font-size="84" font-weight="900" fill="#ffffff" letter-spacing="-2">
            IThingy Labs <tspan font-weight="300" fill="#64748b">LLC</tspan>
        </text>

        <text x="5" y="45" font-family="'Inter', -apple-system, sans-serif" font-size="28" font-weight="700" fill="url(#brandGrad)" letter-spacing="4">
            SECURE <tspan fill="#475569">|</tspan> SCALABLE <tspan fill="#475569">|</tspan> AI-POWERED
        </text>

        <text x="5" y="85" font-family="monospace" font-size="16" font-weight="500" fill="#64748b" letter-spacing="2">
            // CLOUD NATIVE · DISTRIBUTED SYSTEMS · ZERO TRUST · RAPID DELIVERY
        </text>
    </g>
</svg>