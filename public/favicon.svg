<svg width="128" height="128" viewBox="0 0 128 128" fill="none"
     xmlns="http://www.w3.org/2000/svg">

    <defs>
        <linearGradient id="neon" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#9B7CFF"/>
            <stop offset="100%" stop-color="#5B3BFF"/>
        </linearGradient>

        <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="6" result="blur"/>
            <feMerge>
                <feMergeNode in="blur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>

    <!-- background -->
    <rect width="128" height="128" rx="26" fill="#070812"/>

    <!-- neon S -->
    <path
            d="M82 34H46C40 34 36 38 36 44C36 50 40 54 46 54H72C78 54 82 58 82 64C82 70 78 74 72 74H46C40 74 36 78 36 84C36 90 40 94 46 94H82"
            stroke="url(#neon)"
            stroke-width="10"
            stroke-linecap="round"
            stroke-linejoin="round"
            filter="url(#glow)"
    />

</svg>